  .paper-arrow { font-size: 10px; color: #444; flex-shrink: 0; }
  .paper-name { font-size: 13px; font-weight: bold; color: #111; }
  .topic-list { display: none; }
  .topic-list.open { display: block; }
  .topic-row { display: flex; align-items: flex-start; padding: 4px 8px 4px 18px; gap: 5px; border-bottom: 1px solid #ccc; }

  .topic-row input { margin-top: 3px; flex-shrink: 0; }
  .topic-row label { font-size: 12px; color: #222; cursor: pointer; line-height: 1.4; }

  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; height: 100%; }
  #map-wrap { flex: 1; overflow: hidden; padding: 10px 12px 6px 12px; min-width: 0; min-height: 0; }
  pre#map-output { font-family: monospace; font-size: 13px; line-height: 1.5; white-space: pre; margin: 0; overflow: hidden; display: block; }
  #bottom {
    border-top: 1px solid #ccc; padding: 10px 16px;
    flex-shrink: 0; background: #f9f9f9;
    font-size: 13px; line-height: 1.9;
    overflow: hidden;
  }
</style>

function getPool(paper, topic) {
  const key = paper + '|||' + topic;
  return SUBTOPICS[key] || [topic];
}
const filterScroll = document.getElementById('filter-scroll');
Object.entries(FILTER_TOPICS).forEach(([paper, topics]) => {
  const block = document.createElement('div');
  block.className = 'paper-block';
  const header = document.createElement('div');
  header.className = 'paper-header';
  const arrow = document.createElement('span');
  arrow.className = 'paper-arrow';
  arrow.textContent = '\u25b6';
  const name = document.createElement('span');
  name.className = 'paper-name';
  name.textContent = paper;
  header.append(arrow, name);
  const list = document.createElement('div');
  list.className = 'topic-list';
  topics.forEach(t => {
    const row = document.createElement('div');
    row.className = 'topic-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = true;
    cb.value = t; cb.dataset.paper = paper;
    cb.id = 'cb_' + (paper + t).replace(/\W/g, '_');
    const lbl = document.createElement('label');
    lbl.htmlFor = cb.id; lbl.textContent = t;
    row.append(cb, lbl);
    list.appendChild(row);
  });
  header.addEventListener('click', () => {
    const open = list.classList.toggle('open');
    arrow.textContent = open ? '\u25bc' : '\u25b6';
  });
  block.append(header, list);
  filterScroll.appendChild(block);
});

function renderMap(topics) {
  const n = topics.length;
  if (!n) return '';
  const probe = document.createElement('span');
  probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-family:monospace;font-size:13px;line-height:1.5';
  probe.textContent = 'M';
  document.body.appendChild(probe);
  const CW = probe.offsetWidth  || 7;
  const CH = probe.offsetHeight || 17;
  document.body.removeChild(probe);

  const wrap = document.getElementById('map-wrap');
  const bottom = document.getElementById('bottom');
  const availW = wrap.clientWidth  - 24;
  const availH = wrap.clientHeight - 12;
  const maxC = Math.max(20, Math.floor(availW / CW));
  const maxR = Math.max(10, Math.floor(availH / CH));

  const maxLen = Math.max(...topics.map(t => t.length));
  const BW = maxLen + 4;
  const BH = 3;
  const HGAP = 4;
  const VGAP = 2;
  const maxFitCols = Math.max(1, Math.floor((maxC + HGAP) / (BW + HGAP)));
  const COLS = Math.min(maxFitCols, n);
  const ROWS = Math.ceil(n / COLS);

  const GW = COLS * (BW + HGAP) - HGAP;
  const GH = ROWS * (BH + VGAP) - VGAP;
  const W = Math.min(GW, maxC);
  const H = Math.min(GH, maxR);
  const g = Array.from({length: H}, () => Array(W).fill(' '));

  const safe = (y, x, ch, onlyEmpty) => {
    if (y < 0 || y >= H || x < 0 || x >= W) return;
    if (onlyEmpty && g[y][x] !== ' ') return;
    g[y][x] = ch;
  };
  const nodes = topics.map((t, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const bx  = col * (BW + HGAP);
    const by  = row * (BH + VGAP);
    return { t, col, row, bx, by,
      cx: bx + Math.floor(BW / 2),
      rx: bx + BW,
      bot: by + BH };
  });
  nodes.forEach(({ t, bx, by }) => {
    const lbl = t.toUpperCase().padEnd(maxLen);
    safe(by,   bx, '\u250c'); for(let c=1;c<BW-1;c++) safe(by,   bx+c, '\u2500'); safe(by,   bx+BW-1, '\u2510');
    safe(by+1, bx, '\u2502'); safe(by+1, bx+1, ' ');
    for(let c=0;c<maxLen;c++) safe(by+1, bx+2+c, lbl[c]);
    safe(by+1, bx+2+maxLen, ' '); safe(by+1, bx+BW-1, '\u2502');
    safe(by+2, bx, '\u2514'); for(let c=1;c<BW-1;c++) safe(by+2, bx+c, '\u2500'); safe(by+2, bx+BW-1, '\u2518');
  });

  const edges = [];
  const hasIncoming = new Array(n).fill(false);

  for (let i = 0; i < n - 1; i++) {
    const cur = nodes[i];
    const rightIdx = (cur.col + 1 < COLS && i + 1 < n && nodes[i+1].row === cur.row) ? i + 1 : -1;
    const belowIdx = i + COLS < n ? i + COLS : -1;

    let target;
    if (rightIdx >= 0) {
      target = rightIdx;
    } else if (belowIdx >= 0) {
      target = belowIdx;
    } else {
      continue;
    }

    const dir = (nodes[target].row === cur.row) ? 'right' : 'down';
    edges.push([i, target, dir]);
    hasIncoming[target] = true;
    if (Math.random() < 0.25 && target + 1 < n) {
      const skip = target + 1;
      const skipDir = (nodes[skip].row === cur.row) ? 'right' : 'down';
      edges.push([i, skip, skipDir]);
      hasIncoming[skip] = true;
    }
  }
  for (let i = 1; i < n; i++) {
    if (!hasIncoming[i]) {
      const prev = i - 1;
      const dir = (nodes[i].row === nodes[prev].row) ? 'right' : 'down';
      edges.push([prev, i, dir]);
    }
  }
  edges.forEach(([si, ti, dir]) => {
    const s = nodes[si], t = nodes[ti];
    if (dir === 'right') {
      const y = s.by + 1;
      for (let x = s.rx; x < t.bx - 1; x++) safe(y, x, '\u2500', true);
      safe(y, t.bx - 1, '>');
    } else {
      const x1 = s.cx;
      const x2 = t.cx;
      const yStart = s.bot;
      const yEnd   = t.by - 1;
      if (yEnd < yStart) return;

      if (x1 === x2) {
        for (let y = yStart; y < yEnd; y++) safe(y, x1, '\u2502', true);
        safe(yEnd, x2, 'v');
      } else {
        const midY = Math.floor((yStart + yEnd) / 2);
        const xd = x2 > x1 ? 1 : -1;
        for (let y = yStart; y <= midY; y++) safe(y, x1, '\u2502', true);
        const corner1 = xd > 0 ? '\u2514' : '\u2518';
        safe(midY, x1, corner1);
        for (let x = x1 + xd; x !== x2; x += xd) safe(midY, x, '\u2500', true);
        const corner2 = xd > 0 ? '\u2510' : '\u250c';
        safe(midY, x2, corner2);
        for (let y = midY + 1; y < yEnd; y++) safe(y, x2, '\u2502', true);
        safe(yEnd, x2, 'v');
      }
    }
  });

  return g.map(r => r.join('').trimEnd()).join('\n').trimEnd();
}
function generate() {
  const allChecked = [...document.querySelectorAll('#filter-scroll input[type=checkbox][data-paper]:checked')];

  if (!allChecked.length) {
    document.getElementById('map-output').textContent = '(no topics selected)';
    document.getElementById('bottom').innerHTML = '';
    return;
  }
  const pool = [];
  const poolPapers = [];
  allChecked.forEach(cb => {
    const subs = getPool(cb.dataset.paper, cb.value);
    subs.forEach(s => { pool.push(s); poolPapers.push(cb.dataset.paper); });
  });

  const pct = parseInt(document.getElementById('density').value) / 100;
  const count = Math.round(5 + pct * 15);

  const tempPool = pool.map((t, i) => ({ t, p: poolPapers[i] }));
  const selected = [], selectedPapers = [];
  for (let i = 0; i < Math.min(count, tempPool.length); i++) {
    const r = Math.floor(Math.random() * tempPool.length);
    const item = tempPool.splice(r, 1)[0];
    selected.push(item.t);
    selectedPapers.push(item.p);
  }

  document.getElementById('map-output').textContent = renderMap(selected);
  generateInstructions(selected, selectedPapers);
}
function generateInstructions(topics, papers) {
  const n = topics.length;
  const up = new Set(papers.filter(Boolean)).size;

  let cx = n <= 5 && up <= 2 ? 1 : (n >= 12 || up >= 4) ? 3 : 2;
  const timeMin = Math.min(45, [0,10,20,35][cx] + Math.floor(n/3));
  const wMin = timeMin * 18, wMax = timeMin * 25;
  const soc = topics.filter((t,i) => papers[i] === 'Sociology Optional');
  const sh2 = cx===1 ? 'Single argument is fine.'
    : cx===2 ? '2–3 sub-arguments, intro + conclusion.'
    : 'Intro, 3+ paragraphs, conclusion. Depth over breadth.';

  let i=1, html='';
  html += '<b>INSTRUCTIONS</b> <small>('+n+' topics)</small><br>';
  html += '<b>'+(i++)+'. Time:</b> '+timeMin+' min — no stopping, no editing.<br>';
  html += '<b>'+(i++)+'. Length:</b> '+wMin+'–'+wMax+' words (estimate only).<br>';
  html += '<b>'+(i++)+'. Structure:</b> '+sh2+'<br>';
  if (soc.length) {
    const p = soc[Math.floor(Math.random()*soc.length)];
    html += '<b>'+(i++)+'. Sociology:</b> '+(cx>=2
      ? 'Use <b>'+p+'</b> — cite a thinker or study, connect to another map topic.'
      : 'One example from <b>'+p+'</b> — thinker or real case.')+'<br>';
  }

  document.getElementById('bottom').innerHTML = html;
}

document.getElementById('density').addEventListener('input', function() {
  document.getElementById('density-label').textContent = this.value + '%';
});

window.addEventListener('resize', generate);
generate();
